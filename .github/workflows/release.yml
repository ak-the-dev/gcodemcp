name: Release

on:
  push:
    tags:
      - "v*"

env:
  BINARY_NAME: gcode-mcp
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/gcode-mcp

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Validate server manifest
        run: python -m json.tool server.json > /dev/null

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --locked

  build-binaries:
    needs: verify
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: gcode-mcp
          - os: macos-13
            target: x86_64-apple-darwin
            binary: gcode-mcp
          - os: macos-14
            target: aarch64-apple-darwin
            binary: gcode-mcp
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: gcode-mcp.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_DIR="${BINARY_NAME}-${VERSION}-${{ matrix.target }}"
          mkdir -p "dist/${PACKAGE_DIR}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${PACKAGE_DIR}/"
          cp README.md LICENSE ROADMAP.md DISTRIBUTION.md "dist/${PACKAGE_DIR}/"
          tar -czf "dist/${PACKAGE_DIR}.tar.gz" -C dist "${PACKAGE_DIR}"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}".Substring(1)
          $packageDir = "${env:BINARY_NAME}-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/$packageDir" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/$packageDir/"
          Copy-Item README.md, LICENSE, ROADMAP.md, DISTRIBUTION.md "dist/$packageDir/"
          Compress-Archive -Path "dist/$packageDir/*" -DestinationPath "dist/$packageDir.zip" -Force

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  publish-release:
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*

  publish-image:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            VCS_REF=${{ github.sha }}

  publish-mcp-registry:
    needs: publish-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xzf - mcp-publisher

      - name: Stamp server.json for this release
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          VERSION: ${{ github.ref_name }}
        run: |
          export VERSION="${VERSION#v}"
          python - <<'PY'
          import json
          import os

          image_name = os.environ["IMAGE_NAME"]
          version = os.environ["VERSION"]

          with open("server.json", "r", encoding="utf-8") as handle:
              data = json.load(handle)

          data["version"] = version
          for package in data.get("packages", []):
              if package.get("registryType") == "oci":
                  package["identifier"] = f"{image_name}:{version}"
                  package["version"] = version

          with open("server.json", "w", encoding="utf-8") as handle:
              json.dump(data, handle, indent=2)
              handle.write("\n")
          PY

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish
